<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Photo Booth</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial,sans-serif;
background:radial-gradient(circle at top,#103f22,#021006 75%);
color:white;
display:flex;
justify-content:center;
padding:14px;
}

.container{
width:100%;
max-width:430px;
text-align:center;
}

h1{
font-size:24px;
margin-bottom:6px;
font-weight:900;
}

.subtitle{
font-size:14px;
margin-bottom:12px;
}

.frame{
position:relative;
width:100%;
aspect-ratio:4/5;
background:black;
border-radius:18px;
overflow:hidden;
box-shadow:0 0 35px rgba(0,0,0,.8);
}

video,canvas{
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:absolute;
inset:0;
pointer-events:none;
border:8px solid white;
box-shadow:inset 0 0 35px rgba(0,0,0,.8);
}

.top{
position:absolute;
top:35px;
width:100%;
font-size:38px;
font-weight:900;
font-style:italic;
text-shadow:0 0 12px black;
}

.cheer{
position:absolute;
left:22px;
bottom:215px;
font-size:31px;
font-weight:900;
color:#8bd943;
transform:rotate(-8deg);
text-shadow:0 0 10px black;
}

.ball{
position:absolute;
right:48px;
bottom:225px;
font-size:54px;
}

.goal{
position:absolute;
bottom:95px;
width:100%;
font-size:43px;
font-weight:900;
font-style:italic;
text-shadow:0 0 14px black;
}

.logo{
position:absolute;
bottom:18px;
left:50%;
transform:translateX(-50%);
width:105px;
height:auto;
}

.controls{
margin-top:14px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:8px;
}

button,a{
background:white;
color:#072b13;
border:none;
padding:12px 16px;
border-radius:18px;
font-weight:900;
cursor:pointer;
text-decoration:none;
display:inline-block;
font-size:14px;
}

button:nth-child(1),
button:nth-child(3),
button:nth-child(5){
background:#0f672b;
color:white;
}

#countdown{
position:absolute;
inset:0;
display:none;
align-items:center;
justify-content:center;
font-size:110px;
font-weight:900;
background:rgba(0,0,0,.5);
z-index:20;
}

#download{display:none;}
</style>
</head>

<body>

<div class="container">

<h1>⚽ BIG SMILES. BIGGER MEMORIES.</h1>
<p class="subtitle">Strike a pose • Celebrate the moment • Make some noise</p>

<div class="frame">
<video id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

<div id="countdown">3</div>

<div class="overlay">
<div class="top">#GAMEFACEON</div>
<div class="cheer">CHEER!</div>
<div class="ball">⚽🔥</div>
<div class="goal">🔥 GOAAAAAAAL 🔥</div>
<img src="logo.png" class="logo" id="logo">
</div>
</div>

<div class="controls">
<button onclick="startCamera()">📸 Start Camera</button>
<button onclick="startCapture()">📷 Capture</button>
<button onclick="retake()">↻ Retake</button>
<a id="download">⬇ Save Photo</a>
<button onclick="shareWhatsApp()">WhatsApp</button>
</div>

</div>

<script>
const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const download=document.getElementById("download");
const countdown=document.getElementById("countdown");
const logo=document.getElementById("logo");

async function startCamera(){
try{
const stream=await navigator.mediaDevices.getUserMedia({
video:{facingMode:"user"},
audio:false
});
video.srcObject=stream;
}catch(error){
alert("Please allow camera access.");
console.error(error);
}
}

function startCapture(){
let count=3;
countdown.style.display="flex";
countdown.innerHTML=count;

const timer=setInterval(()=>{
count--;
if(count>0){
countdown.innerHTML=count;
}else{
clearInterval(timer);
countdown.innerHTML="⚽";
setTimeout(()=>{
countdown.style.display="none";
capture();
},600);
}
},1000);
}

function drawCover(ctx, video, canvas){
const videoRatio=video.videoWidth/video.videoHeight;
const canvasRatio=canvas.width/canvas.height;

let sx,sy,sWidth,sHeight;

if(videoRatio>canvasRatio){
sHeight=video.videoHeight;
sWidth=video.videoHeight*canvasRatio;
sx=(video.videoWidth-sWidth)/2;
sy=0;
}else{
sWidth=video.videoWidth;
sHeight=video.videoWidth/canvasRatio;
sx=0;
sy=(video.videoHeight-sHeight)/2;
}

ctx.drawImage(video,sx,sy,sWidth,sHeight,0,0,canvas.width,canvas.height);
}

function capture(){
canvas.width=1080;
canvas.height=1350;

const ctx=canvas.getContext("2d");

drawCover(ctx,video,canvas);

ctx.strokeStyle="white";
ctx.lineWidth=26;
ctx.strokeRect(20,20,1040,1310);

ctx.fillStyle="white";
ctx.textAlign="center";
ctx.shadowColor="black";
ctx.shadowBlur=18;

ctx.font="italic bold 88px Arial";
ctx.fillText("#GAMEFACEON",540,125);

ctx.font="bold 95px Arial";
ctx.fillText("⚽🔥",870,1060);

ctx.fillStyle="#8bd943";
ctx.font="italic bold 60px Arial";
ctx.save();
ctx.translate(150,1065);
ctx.rotate(-0.15);
ctx.fillText("CHEER!",0,0);
ctx.restore();

ctx.fillStyle="white";
ctx.font="italic bold 88px Arial";
ctx.fillText("🔥 GOAAAAAAAL 🔥",540,1215);

ctx.shadowBlur=0;

if(logo.complete){
ctx.drawImage(logo,440,1235,200,90);
}

video.style.display="none";
canvas.style.display="block";

const image=canvas.toDataURL("image/png");
download.href=image;
download.download="football-photo-booth.png";
download.style.display="inline-block";
}

function retake(){
canvas.style.display="none";
video.style.display="block";
download.style.display="none";
}

function shareWhatsApp(){

const message = `⚽🔥 GAME FACE ON! 🔥⚽

I just created my football fan photo at the 111 Events Fan Photo Booth 📸

Think you've got what it takes? 😎

Get your game face on:
https://111dubai.github.io/football-photo-booth/

⚽ #GameFaceOn
🔥 #Goaaaaaaal
📣 #Cheer

Powered by 111 Events`;

window.open(
"https://wa.me/?text=" + encodeURIComponent(message),
"_blank"
);

}
</script>

</body>
</html>
