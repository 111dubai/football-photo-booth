<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>111 Events Football Photo Booth</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:linear-gradient(180deg,#0d5e2a,#0a2b13,#041108);
color:white;
display:flex;
justify-content:center;
padding:20px;
}

.container{
width:100%;
max-width:450px;
text-align:center;
}

h1{
margin-bottom:8px;
font-size:26px;
}

.subtitle{
margin-bottom:15px;
opacity:0.95;
font-size:15px;
}

.frame{
position:relative;
width:100%;
aspect-ratio:4/5;
background:black;
border:6px solid white;
border-radius:22px;
overflow:hidden;
box-shadow:0 0 35px rgba(0,0,0,0.5);
}

video,
canvas{
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:absolute;
inset:0;
pointer-events:none;
border:10px solid white;
}

.logo-right{
position:absolute;
top:15px;
right:15px;
background:white;
color:#0a2b13;
padding:8px 14px;
border-radius:20px;
font-weight:bold;
font-size:12px;
}

.top{
position:absolute;
top:70px;
width:100%;
text-align:center;
font-size:31px;
font-weight:bold;
text-shadow:0 0 12px black;
}

.bottom{
position:absolute;
bottom:35px;
width:100%;
text-align:center;
font-size:24px;
font-weight:bold;
text-shadow:0 0 12px black;
}

.ball{
position:absolute;
right:20px;
bottom:90px;
font-size:52px;
}

.cheer{
position:absolute;
left:20px;
bottom:100px;
font-size:28px;
font-weight:bold;
text-shadow:0 0 10px black;
transform:rotate(-8deg);
}

.controls{
margin-top:15px;
}

button,
a{
background:white;
color:#0a2b13;
border:none;
padding:12px 16px;
border-radius:25px;
font-weight:bold;
cursor:pointer;
margin:5px;
text-decoration:none;
display:inline-block;
}

#countdown{
position:absolute;
inset:0;
display:none;
align-items:center;
justify-content:center;
font-size:110px;
font-weight:bold;
background:rgba(0,0,0,0.45);
z-index:20;
}

#download{
display:none;
}
</style>
</head>

<body>

<div class="container">

<h1>⚽ BIG SMILES. BIGGER MEMORIES.</h1>
<p class="subtitle">Strike a pose • Celebrate the moment • Make some noise</p>

<div class="frame">

<video id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

<div id="countdown">3</div>

<div class="overlay">
<div class="logo-right">111 EVENTS ⚽</div>
<div class="top">#GAMEFACEON</div>
<div class="cheer">CHEER!</div>
<div class="ball">⚽🔥</div>
<div class="bottom">🔥 GOAAAAAAAL 🔥</div>
</div>

</div>

<div class="controls">
<button onclick="startCamera()">Start Camera</button>
<button onclick="startCapture()">Capture</button>
<button onclick="retake()">Retake</button>
<a id="download">Save Photo</a>
<button onclick="shareWhatsApp()">WhatsApp</button>
</div>

</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const download = document.getElementById("download");
const countdown = document.getElementById("countdown");

let stream;

async function startCamera(){
try{
stream = await navigator.mediaDevices.getUserMedia({
video:{ facingMode:"user" },
audio:false
});
video.srcObject = stream;
}catch(error){
alert("Camera access denied. Please open the live GitHub Pages link in Safari or Chrome and allow camera permissions.");
console.error(error);
}
}

function startCapture(){
let count = 3;
countdown.style.display="flex";
countdown.innerHTML=count;

const timer=setInterval(()=>{
count--;

if(count>0){
countdown.innerHTML=count;
}else{
clearInterval(timer);
countdown.innerHTML="⚽";
setTimeout(()=>{
countdown.style.display="none";
capture();
},600);
}
},1000);
}

function capture(){
canvas.width=1080;
canvas.height=1350;

const ctx=canvas.getContext("2d");

ctx.drawImage(video,0,0,1080,1350);

ctx.strokeStyle="white";
ctx.lineWidth=28;
ctx.strokeRect(15,15,1050,1320);

ctx.fillStyle="white";
ctx.textAlign="center";
ctx.shadowColor="black";
ctx.shadowBlur=18;

ctx.font="bold 76px Arial";
ctx.fillText("#GAMEFACEON",540,130);

ctx.font="bold 70px Arial";
ctx.fillText("🔥 GOAAAAAAAL 🔥",540,1240);

ctx.font="95px Arial";
ctx.fillText("⚽🔥",885,1080);

ctx.font="bold 48px Arial";
ctx.save();
ctx.translate(165,1080);
ctx.rotate(-0.15);
ctx.fillText("CHEER!",0,0);
ctx.restore();

ctx.shadowBlur=0;
ctx.fillStyle="white";
ctx.fillRect(760,30,260,60);

ctx.fillStyle="#0a2b13";
ctx.font="bold 25px Arial";
ctx.fillText("111 EVENTS ⚽",890,70);

video.style.display="none";
canvas.style.display="block";

const image=canvas.toDataURL("image/png");

download.href=image;
download.download="111-events-gamefaceon.png";
download.style.display="inline-block";
}

function retake(){
canvas.style.display="none";
video.style.display="block";
download.style.display="none";
}

function shareWhatsApp(){
window.open(
"https://wa.me/?text=" +
encodeURIComponent(
"⚽ #GameFaceOn ⚽ #Goaaaaaaal ⚽ #Cheer\n\nBig Smiles. Bigger Memories.\n\nPhoto Booth by 111 Events"
),
"_blank"
);
}
</script>

</body>
</html>
