<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Big Smiles. Bigger Memories.</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:#0a2b13;
color:white;
display:flex;
justify-content:center;
padding:20px;
}

.container{
width:100%;
max-width:450px;
text-align:center;
}

h1{
margin-bottom:8px;
font-size:28px;
}

.subtitle{
margin-bottom:15px;
opacity:0.9;
}

.frame{
position:relative;
width:100%;
aspect-ratio:9/16;
background:black;
border:6px solid white;
border-radius:20px;
overflow:hidden;
}

video,
canvas{
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:absolute;
inset:0;
pointer-events:none;
border:10px solid white;
}

.top{
position:absolute;
top:90px;
width:100%;
text-align:center;
font-size:30px;
font-weight:bold;
text-shadow:0 0 10px black;
}

.bottom{
position:absolute;
bottom:40px;
width:100%;
text-align:center;
font-size:22px;
font-weight:bold;
text-shadow:0 0 10px black;
}

.ball{
position:absolute;
right:20px;
bottom:100px;
font-size:55px;
}

.logo-left,
.logo-right{
position:absolute;
top:15px;
background:white;
color:#0a2b13;
padding:8px 12px;
border-radius:20px;
font-weight:bold;
font-size:12px;
}

.logo-left{
left:15px;
}

.logo-right{
right:15px;
}

.controls{
margin-top:15px;
}

button,
a{
background:white;
color:#0a2b13;
border:none;
padding:12px 16px;
border-radius:25px;
font-weight:bold;
cursor:pointer;
margin:5px;
text-decoration:none;
display:inline-block;
}

#countdown{
position:absolute;
inset:0;
display:none;
align-items:center;
justify-content:center;
font-size:120px;
font-weight:bold;
background:rgba(0,0,0,0.4);
z-index:20;
}

#download{
display:none;
}
</style>
</head>

<body>

<div class="container">

<h1>⚽ Big Smiles. Bigger Memories.</h1>
<p class="subtitle">Get Your Game Face On!</p>

<div class="frame">

<video id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

<div id="countdown">3</div>

<div class="overlay">
<div class="logo-left">SPONSOR</div>
<div class="logo-right">111 EVENTS</div>

<div class="top">BIG SMILES</div>
<div class="ball">⚽</div>
<div class="bottom">BIGGER MEMORIES</div>
</div>

</div>

<div class="controls">
<button onclick="startCamera()">Start Camera</button>
<button onclick="startCapture()">Capture</button>
<button onclick="retake()">Retake</button>

<a id="download">Save Photo</a>

<button onclick="shareWhatsApp()">WhatsApp</button>
</div>

</div>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const download = document.getElementById("download");
const countdown = document.getElementById("countdown");

let stream;

async function startCamera(){

try{

stream = await navigator.mediaDevices.getUserMedia({
video:{
facingMode:"user"
},
audio:false
});

video.srcObject = stream;

}catch(error){

alert("Camera access denied. Please allow camera permissions.");
console.error(error);

}
}

function startCapture(){

let count = 3;

countdown.style.display="flex";
countdown.innerHTML=count;

const timer=setInterval(()=>{

count--;

if(count>0){

countdown.innerHTML=count;

}else{

clearInterval(timer);

countdown.innerHTML="⚽";

setTimeout(()=>{

countdown.style.display="none";
capture();

},600);

}

},1000);

}

function capture(){

canvas.width=1080;
canvas.height=1920;

const ctx=canvas.getContext("2d");

ctx.drawImage(video,0,0,1080,1920);

ctx.strokeStyle="white";
ctx.lineWidth=25;
ctx.strokeRect(15,15,1050,1890);

ctx.fillStyle="white";
ctx.textAlign="center";

ctx.font="bold 80px Arial";
ctx.fillText("BIG SMILES",540,180);

ctx.font="bold 65px Arial";
ctx.fillText("BIGGER MEMORIES",540,1780);

ctx.font="90px Arial";
ctx.fillText("⚽",930,1650);

ctx.fillStyle="white";
ctx.fillRect(40,40,220,60);

ctx.fillRect(820,40,220,60);

ctx.fillStyle="#0a2b13";
ctx.font="bold 22px Arial";
ctx.fillText("SPONSOR",150,80);
ctx.fillText("111 EVENTS",930,80);

video.style.display="none";
canvas.style.display="block";

const image=canvas.toDataURL("image/png");

download.href=image;
download.download="big-smiles-bigger-memories.png";
download.style.display="inline-block";

}

function retake(){

canvas.style.display="none";
video.style.display="block";
download.style.display="none";

}

function shareWhatsApp(){

window.open(
"https://wa.me/?text=" +
encodeURIComponent(
"I got my game face on! ⚽ Big Smiles. Bigger Memories."
),
"_blank"
);

}

</script>

</body>
</html>
